<!DOCTYPE html>
<html 
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
	layout:decorate="~{layout/layout.html}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<main layout:fragment="content">
		<h1>게시글 수정</h1>
		<form th:action="@{/post/update/{po_num}(po_num=*{po_num})}" th:object="${post}" method="post">
			<input type="hidden" th:field="*{po_num}">
			<div class="form-group">
				<label for="po_title">제목</label>
				<input type="text" th:field="*{po_title}" class="form-control" readonly>
			</div>
			<div class="form-group">
				<label for="po_me_id">작성자</label>
				<input type="text" th:field="*{po_me_id}" class="form-control" >
			</div>
			<div class="form-group">
				<label for="po_content">내용</label>
				<textarea th:field="*{po_content}" class="form-control" style="min-height: 400px; height: auto"></textarea>
			</div>
			<button class="btn btn-outline-dark col-12 mb-2">게시글 수정</button>
		</form>
		<a class="btn btn-outline-dark mb-2" th:href="@{/post/list/{co_num}(co_num=${co_num})}">목록</a>
	</main>
</body>
</html>
