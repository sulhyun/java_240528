<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
</head>
<body>
	<h1>SpringEL 표현식</h1>
		<h2>Object</h2>
		<ul>
			<li>${user.username} = <span th:text="${user.username}"></span></li>
			<li>${user['username']} = <span th:text="${user['username']}"></span></li>
			<li>${user.getUsername()} = <span th:text="${user.getUsername()}"></span></li>
		</ul>
		<h2>List</h2>
		<ul>
			<li>${list[0].username} = <span th:text="${list[0].username}"></span></li>
			<li>${list[0]['username']} = <span th:text="${list[0]['username']}"></span></li>
			<li>${list[0].getUsername()} = <span th:text="${list[0].getUsername()}"></span></li>
		</ul>
		<h2>Map</h2>
		<ul>
			<li>${map['userA'].username} = <span th:text="${map['userA'].username}"></span></li>
			<li>${map['userA']['username']} = <span th:text="${map['userA']['username']}"></span></li>
			<li>${map['userA'].getUsername()} = <span th:text="${map['userA'].getUsername()}"></span></li>
		</ul>
</body>
</html>
